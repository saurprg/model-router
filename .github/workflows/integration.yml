# Manual live upstream tests. Requires repository secrets (Settings → Secrets → Actions):
#   GROQ_API_KEY, DO_MODEL_ACCESS_KEY
name: Integration (manual)

on:
  workflow_dispatch:

jobs:
  live-e2e:
    name: Live API smoke
    runs-on: ubuntu-latest
    env:
      GATEWAY_API_KEY: ci-test-gateway-key
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      DO_MODEL_ACCESS_KEY: ${{ secrets.DO_MODEL_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start gateway
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health && break
            sleep 1
          done

      - name: Run integration smoke tests
        run: bash scripts/ci-integration-live.sh
