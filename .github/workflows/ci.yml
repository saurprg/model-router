name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required by app/settings.py at import time. Tests use mocks — no real LLM keys needed.
env:
  GATEWAY_API_KEY: ci-test-gateway-key

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -q --tb=short

  smoke:
    name: Startup smoke (/health)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start server and probe /health
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health | grep -q '"status":"ok"'; then
              echo "Health check passed"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to become healthy"
          exit 1
