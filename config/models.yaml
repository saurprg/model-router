routes:
  do/openai:
    primary: { provider: digitalocean, model: openai-gpt-5-nano }
    fallbacks: []

  do/anthropic:
    primary: { provider: digitalocean, model: anthropic-claude-haiku-4.5 }
    fallbacks: []

  do/llama:
    primary: { provider: digitalocean, model: llama3.3-70b-instruct }
    fallbacks: []

  smart/general:
    primary: { provider: groq, model: llama-3.1-8b-instant }
    fallbacks:
      - { provider: digitalocean, model: llama3.3-70b-instruct }
      - { provider: digitalocean, model: openai-gpt-5-nano }
      - { provider: digitalocean, model: anthropic-claude-haiku-4.5 }

  fast/demo:
    primary: { provider: groq, model: llama-3.1-8b-instant }
    fallbacks: []

providers:
  digitalocean:
    base_url: https://inference.do-ai.run/v1
    api_key_env: DO_MODEL_ACCESS_KEY
  groq:
    base_url: https://api.groq.com/openai/v1
    api_key_env: GROQ_API_KEY
  openai:
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
  anthropic:
    base_url: https://api.anthropic.com
    api_key_env: ANTHROPIC_API_KEY
